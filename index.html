```
<div class="header-container">
    <h1>List Fixer</h1>
    <div class="version">v1.3.1</div>
    <div class="hint">Drag items within or between sections. Drag a section header to move the whole section.</div>
</div>

<div class="button-row">
    <button class="btn" onclick="pasteFromClipboard()">Paste Markdown</button>
    <button class="btn btn-clear" onclick="clearAll()">Clear</button>
    <button class="btn btn-copy" onclick="exportMarkdown(event)">Copy</button>
</div>

<textarea id="manual-paste" placeholder="Safari blocked auto-paste. Tap here and select 'Paste' to import your list..."></textarea>

<div id="sections-container"></div>

<button id="bottom-copy-btn" class="btn btn-copy bottom-copy" onclick="exportMarkdown(event)">Copy Markdown</button>

<script>
    // ----- Markdown link rendering (display only — raw text is preserved on data-raw) -----
    function escapeHtml(str) {
        return str
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    // Convert [[Page]], [[Page|Alias]], and [label](url) into styled link spans.
    // Also strips the leading list marker (-, *, +) for visual display only.
    // Input is RAW text; output is HTML-safe (input is escaped before substitution).
    function renderMarkdownLinks(rawText) {
        // Strip leading bullet marker for display (raw text on data-raw is unaffected)
        const displayText = rawText.replace(/^\s*[-*+]\s+/, '');
        let html = escapeHtml(displayText);

        // Wiki-links: [[Page|Alias]] or [[Page]]. After escaping, brackets are literal.
        html = html.replace(/\[\[([^\]|]+?)(?:\|([^\]]+?))?\]\]/g, (match, page, alias) => {
            const display = alias ? alias : page;
            return `<span class="md-link">${display}</span>`;
        });

        // Standard markdown links: [label](url). Same logic.
        html = html.replace(/\[([^\]]+?)\]\(([^)]+?)\)/g, (match, label) => {
            return `<span class="md-link">${label}</span>`;
        });

        return html;
    }

    const sectionsContainer = document.getElementById('sections-container');
    const bottomBtn = document.getElementById('bottom-copy-btn');
    const manualInput = document.getElementById('manual-paste');

    // Track all SortableJS instances on item-lists so they share a group (cross-section drag)
    const itemSortables = [];
    let sectionsSortable = null;

    manualInput.addEventListener('input', () => {
        if (manualInput.value.trim() !== '') {
            generateList(manualInput.value);
            manualInput.value = '';
            manualInput.style.display = 'none';
        }
    });

    async function pasteFromClipboard() {
        try {
            const text = await navigator.clipboard.readText();
            if (text && text.trim() !== "") {
                generateList(text);
                manualInput.style.display = 'none';
            }
        } catch (err) {
            manualInput.style.display = 'block';
            manualInput.focus();
        }
    }

    // A "list item" line starts with optional whitespace, then a bullet marker (-, *, or +).
    // Anything else is treated as a section header (including markdown headers like "# Foo").
    function isListLine(line) {
        return /^\s*[-*+]\s+/.test(line);
    }

    function generateList(text) {
        // Reset
        sectionsContainer.innerHTML = '';
        itemSortables.length = 0;
        if (sectionsSortable) { sectionsSortable.destroy(); sectionsSortable = null; }

        const lines = text.split('\n').filter(line => line.trim() !== '');

        // Group lines into sections. A section = (optional header) + (zero or more item lines).
        // If the file starts with item lines (no header first), we create an unnamed leading section.
        const sections = [];
        let current = null;

        for (const line of lines) {
            if (isListLine(line)) {
                if (!current) {
                    current = { header: null, items: [] };
                    sections.push(current);
                }
                current.items.push(line);
            } else {
                // New section starts
                current = { header: line, items: [] };
                sections.push(current);
            }
        }

        // Build DOM
        sections.forEach(sec => sectionsContainer.appendChild(buildSectionElement(sec)));

        // Wire up SortableJS — sections sortable on the outer container
        sectionsSortable = new Sortable(sectionsContainer, {
            animation: 150,
            handle: '.section-header',
            ghostClass: 'sortable-ghost',
            draggable: '.section'
        });

        // And per-section sortables that share a group so items can move between sections
        document.querySelectorAll('.item-list').forEach(ul => {
            const s = new Sortable(ul, {
                animation: 150,
                group: 'items',
                handle: '.list-item',
                ghostClass: 'sortable-ghost',
                draggable: '.list-item',
                filter: '.delete-btn',
                preventOnFilter: false
            });
            itemSortables.push(s);
        });

        bottomBtn.style.display = sections.length ? 'block' : 'none';
    }

    function buildSectionElement(section) {
        const wrapper = document.createElement('div');
        wrapper.className = 'section';

        if (section.header !== null) {
            const headerEl = document.createElement('div');
            headerEl.className = 'section-header';
            headerEl.innerHTML = `
                <span class="handle">☰</span>
                <span class="header-text"></span>
                <button class="delete-btn" aria-label="Delete section" onclick="deleteSection(this)">×</button>
            `;
            const headerText = headerEl.querySelector('.header-text');
            headerText.dataset.raw = section.header;
            headerText.innerHTML = renderMarkdownLinks(section.header);
            wrapper.appendChild(headerEl);
        }

        const ul = document.createElement('ul');
        ul.className = 'item-list';
        section.items.forEach(itemText => {
            ul.appendChild(buildItemElement(itemText));
        });
        wrapper.appendChild(ul);

        return wrapper;
    }

    function buildItemElement(text) {
        const li = document.createElement('li');
        li.className = 'list-item';
        li.innerHTML = `
            <span class="handle">☰</span>
            <span class="text-content"></span>
            <button class="delete-btn" aria-label="Delete item" onclick="deleteItem(this)">×</button>
        `;
        const textEl = li.querySelector('.text-content');
        textEl.dataset.raw = text;
        textEl.innerHTML = renderMarkdownLinks(text);
        return li;
    }

    function deleteItem(btn) {
        const li = btn.closest('.list-item');
        if (li) li.remove();
    }

    function deleteSection(btn) {
        // Deletes the section header AND all items in that section.
        const section = btn.closest('.section');
        if (section) section.remove();
        // If everything is gone, hide the bottom copy button
        if (sectionsContainer.children.length === 0) {
            bottomBtn.style.display = 'none';
        }
    }

    function clearAll() {
        sectionsContainer.innerHTML = '';
        itemSortables.length = 0;
        if (sectionsSortable) { sectionsSortable.destroy(); sectionsSortable = null; }
        bottomBtn.style.display = 'none';
        manualInput.style.display = 'none';
        manualInput.value = '';
    }

    function exportMarkdown(event) {
        const sectionBlocks = [];
        document.querySelectorAll('.section').forEach(section => {
            const lines = [];
            const headerEl = section.querySelector('.section-header .header-text');
            if (headerEl) lines.push(headerEl.dataset.raw || headerEl.innerText);
            section.querySelectorAll('.list-item .text-content').forEach(item => {
                lines.push(item.dataset.raw || item.innerText);
            });
            if (lines.length) sectionBlocks.push(lines.join('\n'));
        });
        // Blank line between sections, trailing newline at end
        const output = sectionBlocks.length ? sectionBlocks.join('\n\n') + '\n' : '';

        navigator.clipboard.writeText(output).then(() => {
            const target = event.currentTarget;
            const originalText = (target.id === 'bottom-copy-btn') ? 'Copy Markdown' : 'Copy';
            target.innerText = 'Copied!';
            setTimeout(() => { target.innerText = originalText; }, 1500);
        });
    }
</script>
